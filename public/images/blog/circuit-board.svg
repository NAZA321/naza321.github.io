<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="abstract circuit board">
  <defs>
    <linearGradient id="cb-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1026"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="cb-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="cb-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#6366f1" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#cb-bg)"/>
  <rect width="1200" height="675" fill="url(#cb-grid)"/>
  <circle cx="600" cy="338" r="320" fill="url(#cb-glow)"/>

  <!-- traces -->
  <g fill="none" stroke="#6366f1" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 160 H200 L260 100 H520"/>
    <path d="M1200 200 H960 L900 260 H700"/>
    <path d="M0 520 H280 L340 580 H640"/>
    <path d="M1200 540 H980 L920 480 H760"/>
    <path d="M600 0 V120 L660 180 V300"/>
    <path d="M600 675 V540 L540 480 V360"/>
  </g>
  <g fill="none" stroke="#14b8a6" stroke-opacity="0.6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M260 100 V40 H460"/>
    <path d="M900 260 L860 300 H700"/>
    <path d="M340 580 V640 H560"/>
  </g>

  <!-- central chip -->
  <g transform="translate(600 338)" stroke="#a5b4fc" stroke-opacity="0.85" fill="none" stroke-width="3">
    <rect x="-70" y="-70" width="140" height="140" rx="14" fill="#312e81" fill-opacity="0.65"/>
    <rect x="-36" y="-36" width="72" height="72" rx="8"/>
    <g stroke-linecap="round">
      <path d="M-70 -36 H-96 M-70 0 H-96 M-70 36 H-96"/>
      <path d="M70 -36 H96 M70 0 H96 M70 36 H96"/>
      <path d="M-36 -70 V-96 M0 -70 V-96 M36 -70 V-96"/>
      <path d="M-36 70 V96 M0 70 V96 M36 70 V96"/>
    </g>
  </g>

  <!-- nodes / pads -->
  <g>
    <circle cx="520" cy="100" r="7" fill="#14b8a6"/>
    <circle cx="700" cy="260" r="7" fill="#818cf8"/>
    <circle cx="640" cy="580" r="7" fill="#14b8a6"/>
    <circle cx="760" cy="480" r="6" fill="#a5b4fc"/>
    <circle cx="460" cy="40" r="6" fill="#818cf8"/>
    <circle cx="560" cy="640" r="6" fill="#14b8a6"/>
  </g>
</svg>

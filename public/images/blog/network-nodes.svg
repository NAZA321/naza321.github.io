<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="abstract network of nodes">
  <defs>
    <linearGradient id="nn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1026"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <radialGradient id="nn-glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#nn-bg)"/>
  <circle cx="600" cy="300" r="380" fill="url(#nn-glow)"/>

  <!-- edges -->
  <g stroke="#a5b4fc" stroke-opacity="0.45" stroke-width="2">
    <line x1="200" y1="160" x2="480" y2="120"/>
    <line x1="480" y1="120" x2="760" y2="220"/>
    <line x1="760" y1="220" x2="1000" y2="140"/>
    <line x1="200" y1="160" x2="340" y2="380"/>
    <line x1="340" y1="380" x2="600" y2="340"/>
    <line x1="600" y1="340" x2="760" y2="220"/>
    <line x1="600" y1="340" x2="820" y2="500"/>
    <line x1="340" y1="380" x2="280" y2="560"/>
    <line x1="820" y1="500" x2="1020" y2="540"/>
    <line x1="600" y1="340" x2="1000" y2="140"/>
    <line x1="280" y1="560" x2="620" y2="600"/>
    <line x1="820" y1="500" x2="620" y2="600"/>
    <line x1="1000" y1="140" x2="1020" y2="540"/>
  </g>

  <!-- nodes -->
  <g>
    <circle cx="200" cy="160" r="10" fill="#818cf8"/>
    <circle cx="480" cy="120" r="8" fill="#c4b5fd"/>
    <circle cx="760" cy="220" r="12" fill="#22d3ee"/>
    <circle cx="1000" cy="140" r="9" fill="#818cf8"/>
    <circle cx="340" cy="380" r="9" fill="#c4b5fd"/>
    <circle cx="600" cy="340" r="16" fill="#818cf8"/>
    <circle cx="600" cy="340" r="16" fill="none" stroke="#22d3ee" stroke-opacity="0.7" stroke-width="2"/>
    <circle cx="820" cy="500" r="10" fill="#22d3ee"/>
    <circle cx="280" cy="560" r="8" fill="#818cf8"/>
    <circle cx="1020" cy="540" r="9" fill="#c4b5fd"/>
    <circle cx="620" cy="600" r="8" fill="#22d3ee"/>
  </g>
</svg>

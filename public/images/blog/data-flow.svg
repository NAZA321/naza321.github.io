<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="abstract data flow">
  <defs>
    <linearGradient id="df-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06121f"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="df-glow" cx="0.3" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="df-grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#22d3ee" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#df-bg)"/>
  <rect width="1200" height="675" fill="url(#df-grid)"/>
  <circle cx="400" cy="338" r="340" fill="url(#df-glow)"/>

  <!-- flowing data streams -->
  <g fill="none" stroke-linecap="round" stroke-width="3">
    <path d="M-20 180 C 240 120, 420 260, 700 200 S 1100 140, 1240 220" stroke="#22d3ee" stroke-opacity="0.7"/>
    <path d="M-20 340 C 260 300, 460 420, 700 360 S 1080 320, 1240 380" stroke="#6366f1" stroke-opacity="0.7"/>
    <path d="M-20 500 C 220 460, 440 560, 720 500 S 1100 480, 1240 540" stroke="#818cf8" stroke-opacity="0.6"/>
  </g>

  <!-- packets along streams -->
  <g>
    <rect x="320" y="220" width="16" height="16" rx="3" fill="#22d3ee" transform="rotate(12 328 228)"/>
    <rect x="640" y="186" width="14" height="14" rx="3" fill="#67e8f9" transform="rotate(-8 647 193)"/>
    <rect x="940" y="170" width="14" height="14" rx="3" fill="#22d3ee" transform="rotate(10 947 177)"/>
    <rect x="420" y="396" width="16" height="16" rx="3" fill="#818cf8" transform="rotate(-10 428 404)"/>
    <rect x="780" y="346" width="14" height="14" rx="3" fill="#a5b4fc" transform="rotate(8 787 353)"/>
    <rect x="500" y="528" width="14" height="14" rx="3" fill="#818cf8" transform="rotate(-12 507 535)"/>
    <rect x="880" y="492" width="14" height="14" rx="3" fill="#a5b4fc" transform="rotate(6 887 499)"/>
  </g>

  <!-- endpoint nodes -->
  <g>
    <circle cx="1240" cy="220" r="8" fill="#22d3ee"/>
    <circle cx="1240" cy="380" r="8" fill="#6366f1"/>
    <circle cx="1240" cy="540" r="8" fill="#818cf8"/>
  </g>

  <!-- source stack (left) -->
  <g transform="translate(120 290)" fill="#312e81" fill-opacity="0.7" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="2">
    <rect x="0" y="0" width="120" height="28" rx="6"/>
    <rect x="0" y="38" width="120" height="28" rx="6"/>
    <rect x="0" y="76" width="120" height="28" rx="6"/>
  </g>
</svg>
